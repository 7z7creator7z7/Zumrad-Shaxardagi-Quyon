<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zumrad Shahar Quyonchasi</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

    <!-- Quyoncha shu yerda paydo bo'ladi -->
    <div id="rabbit-container">
        <img id="rabbit-image" src="rabbit.png" alt="Sehrli quyon">
    </div>

    <!-- Narsa paydo bo'ladigan joy -->
    <div id="magic-canvas"></div>

    <!-- Suhbat maydoni -->
    <div id="chat-area">
        <input type="text" id="user-input" placeholder="Quyonchaga biror narsa de...">
        <button onclick="sendMessage()">Yuborish</button>
    </div>

    <script src="Script.js"></script>
</body>
</html>
